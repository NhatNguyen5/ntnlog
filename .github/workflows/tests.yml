name: Python Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify import
      run: |
        python -c "from ntnlog import Logger, GLOBAL_LOGGING_ENABLED, GLOBAL_LOG_TRACING_ENABLED; print('✓ Import successful')"

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

  version-check:
    name: Version consistency
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check all version references match
      run: |
        TOML_VER=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        INIT_VER=$(grep '^__version__ = ' ntnlog/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
        BUMP_VER=$(grep '^current_version = ' .bumpversion.cfg | sed 's/current_version = //')

        echo "pyproject.toml:     $TOML_VER"
        echo "ntnlog/__init__.py:  $INIT_VER"
        echo ".bumpversion.cfg:    $BUMP_VER"

        FAIL=0
        [ "$TOML_VER" != "$INIT_VER" ] && echo "❌ pyproject.toml ($TOML_VER) != ntnlog/__init__.py ($INIT_VER)" && FAIL=1
        [ "$TOML_VER" != "$BUMP_VER" ] && echo "❌ pyproject.toml ($TOML_VER) != .bumpversion.cfg ($BUMP_VER)"   && FAIL=1
        [ "$FAIL" -eq 0 ] && echo "✓ All version references match: $TOML_VER"
        exit $FAIL

  coverage:
    name: Coverage report
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with full coverage report
      run: |
        python -m pytest tests/ --cov-report=html --cov-report=xml

    - name: Generate coverage badge
      run: |
        pip install genbadge[coverage]
        genbadge coverage -i coverage.xml -o htmlcov/coverage.svg

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: htmlcov/

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v5