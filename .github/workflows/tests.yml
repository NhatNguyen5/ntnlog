name: Python Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify import
      run: |
        python -c "from ntnlog import Logger, GLOBAL_LOGGING_ENABLED, GLOBAL_LOG_TRACING_ENABLED; print('✓ Import successful')"

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

  coverage:
    name: Coverage report
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with full coverage report
      run: |
        python -m pytest tests/ --cov-report=html --cov-report=xml

    - name: Generate coverage badge
      run: coverage-badge -o htmlcov/coverage.svg -f

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: htmlcov/

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4