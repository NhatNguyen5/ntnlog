name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify import
      run: |
        python -c "from logging_module import Logger, GLOBAL_LOGGING_ENABLED, GLOBAL_LOG_TRACING_ENABLED; print('✓ Import successful')"

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

  changelog:
    name: Update Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to update the release body

    steps:
    - uses: actions/checkout@v6

    - name: Extract changelog for this version
      id: extract
      run: |
        # Pull the version tag from the release (strips leading 'v' if present)
        VERSION="${{ github.event.release.tag_name }}"
        VERSION="${VERSION#v}"

        # Extract the block between this version's heading and the next
        NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

        if [ -z "$NOTES" ]; then
          echo "⚠️  No changelog entry found for version $VERSION"
          NOTES="_No changelog entry found for this version._"
        fi

        # Write to a temp file to avoid multiline env var issues
        echo "$NOTES" > release_notes.txt
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Update GitHub Release body
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release edit "${{ github.event.release.tag_name }}" \
          --notes-file release_notes.txt

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test  # only publish if all test matrix jobs pass
    environment:
      name: pypi
      url: https://pypi.org/p/logging-module
    permissions:
      id-token: write  # required for Trusted Publishing

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install build tools
      run: python -m pip install build

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1